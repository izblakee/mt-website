<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MT 홍보</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;
      background: url("bg.jpg") no-repeat center;
      background-size: cover;
    }

    /* 🎬 Video Background */
    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    /* 🔥 Overlay */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.45);
      z-index: -1;
    }

    .container {
      padding: 40px 20px;
    }

    .title {
      font-size: 55px;
      font-weight: bold;
      margin-top: 50px;
      animation: fadeIn 1.5s ease-in-out;
    }

    .subtitle {
      font-size: 20px;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    #countdown {
      font-size: 26px;
      margin-top: 10px;
      color: #00eaff;
      font-weight: bold;
    }

    .card {
      background: rgba(255,255,255,0.95);
      color: black;
      margin: 20px auto;
      padding: 20px;
      border-radius: 20px;
      width: 90%;
      max-width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      animation: fadeUp 1s ease;
    }

    .btn {
      display: inline-block;
      padding: 15px 30px;
      background: linear-gradient(45deg, red, orange);
      color: white;
      border-radius: 40px;
      text-decoration: none;
      margin-top: 25px;
      font-size: 18px;
      font-weight: bold;
      transition: 0.3s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    /* 🔥 Footer Banner */
    .footer-banner {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 50px;
      background: rgba(0, 0, 0, 0.9);
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    .scroll-text {
      white-space: nowrap;
      color: yellow;
      font-weight: bold;
      font-size: 16px;
      padding-left: 100%;
      animation: scroll 12s linear infinite;
    }

    @keyframes scroll {
      from { transform: translateX(0); }
      to { transform: translateX(-100%); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 📱 Mobile Optimization */
    @media (max-width: 600px) {
      .title {
        font-size: 40px;
      }
      .subtitle {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

<!-- 🎬 Video -->
<video autoplay muted loop playsinline webkit-playsinline id="bg-video" poster="bg.jpg">
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">
  <h1 class="title">🔥 MT 모집 🔥</h1>
  <p class="subtitle">안 오면 100% 후회 🤑</p>
  <h2 id="countdown"></h2>

  <div class="card">
    <h2>📅 일정</h2>
    <p>2026년 4월 3일 ~ 4월 4일</p>
  </div>

  <div class="card">
    <h2>📍 장소</h2>
    <p>포항</p>
  </div>

  <div class="card">
    <h2>💰 비용</h2>
    <p>40,000원</p>
  </div>

  <a href="#" class="btn">👉 바로참여</a>
</div>

<div class="footer-banner">
  <div class="scroll-text">
    🔥 백마는 영어부터 🔥 안 오면 후회 🔥 지금 신청 안 하면 끝 🔥
  </div>
</div>

<script>
const targetDate = new Date("2026-04-03").getTime();

setInterval(function() {
  const now = new Date().getTime();
  const diff = targetDate - now;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);

  document.getElementById("countdown").innerHTML =
    "🚨 마감까지 D-" + days + " (" + hours + "시간)";
}, 1000);
</script>

</body>
</html>
